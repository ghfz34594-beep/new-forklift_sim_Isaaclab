params:
  seed: 42

  env:
    clip_observations: 10.0
    clip_actions: 1.0

  algo:
    name: a2c_continuous

  model:
    name: continuous_a2c_logstd

  network:
    name: actor_critic
    separate: False
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        fixed_sigma: True
        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0
    mlp:
      units: [256, 256, 128]
      activation: elu
      d2rl: False
      initializer:
        name: default

  load_checkpoint: False
  load_path: ""

  config:
    name: rotary_double_pendulum_direct
    env_name: rlgpu
    device: "cuda:0"
    device_name: "cuda:0"
    multi_gpu: False
    ppo: True
    mixed_precision: True  # 启用混合精度，加速训练
    normalize_input: True
    normalize_value: True
    num_actors: -1
    reward_shaper:
      scale_value: 0.1
    normalize_advantage: True
    gamma: 0.99
    tau: 0.95
    learning_rate: 3e-4
    lr_schedule: adaptive
    kl_threshold: 0.008
    score_to_win: 100000
    max_epochs: 1000
    save_best_after: 100
    save_frequency: 50
    grad_norm: 1.0
    entropy_coef: 0.001
    truncate_grads: True
    e_clip: 0.2
    horizon_length: 128      # 增加: 64 -> 128，收集更多经验
    minibatch_size: 65536    # 增加: 32768 -> 65536，更大批次
    mini_epochs: 8
    critic_coef: 2
    clip_value: True
    seq_length: 4
    bounds_loss_coef: 0.0001
