<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>叉车仿真控制台</title>
<style>
  /* ---------- 全局 ---------- */
  :root {
    --bg: #0d0f14;
    --surface: #151821;
    --surface2: #1e2330;
    --border: #2a3040;
    --accent: #f5a623;
    --accent2: #e07b10;
    --green: #39d98a;
    --red: #ff5454;
    --blue: #4d9eff;
    --text: #e2e8f0;
    --muted: #6b7685;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ---------- 顶栏 ---------- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--accent);
  }

  .logo svg { width: 32px; height: 32px; }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    background: var(--surface2);
    border: 1px solid var(--border);
    transition: all .3s;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: all .3s;
  }

  .status-badge.connected .status-dot { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .status-badge.connected { border-color: var(--green); color: var(--green); }
  .status-badge.disconnected { border-color: var(--red); color: var(--red); }
  .status-badge.disconnected .status-dot { background: var(--red); }
  .status-badge.waiting { border-color: var(--accent); color: var(--accent); }
  .status-badge.waiting .status-dot { background: var(--accent); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ---------- 主体布局 ---------- */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 20px;
    padding: 20px 28px;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
  }

  /* ---------- 控制面板 ---------- */
  .control-panel {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .card-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* ---------- 方向控制 ---------- */
  .dpad {
    display: grid;
    grid-template-columns: repeat(3, 72px);
    grid-template-rows: repeat(3, 72px);
    gap: 8px;
    justify-content: center;
  }

  .dpad-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .12s;
    user-select: none;
    -webkit-user-select: none;
  }

  .dpad-btn:hover { border-color: var(--accent); color: var(--accent); }
  .dpad-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    box-shadow: 0 0 16px rgba(245,166,35,.4);
    transform: scale(0.96);
  }

  .dpad-center { grid-column: 2; grid-row: 2; }
  .dpad-up    { grid-column: 2; grid-row: 1; }
  .dpad-down  { grid-column: 2; grid-row: 3; }
  .dpad-left  { grid-column: 1; grid-row: 2; }
  .dpad-right { grid-column: 3; grid-row: 2; }

  /* ---------- 起升控制 ---------- */
  .lift-controls {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-top: 8px;
  }

  .lift-btn {
    flex: 1;
    height: 64px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all .12s;
    user-select: none;
  }

  .lift-btn.up:hover   { border-color: var(--blue); color: var(--blue); }
  .lift-btn.down:hover { border-color: var(--red);  color: var(--red); }
  .lift-btn.up.active  { background: var(--blue);  border-color: var(--blue);  color: #fff; box-shadow: 0 0 16px rgba(77,158,255,.4); }
  .lift-btn.down.active{ background: var(--red);   border-color: var(--red);   color: #fff; box-shadow: 0 0 16px rgba(255,84,84,.4); }

  /* ---------- 停止按钮 ---------- */
  .stop-btn {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1.5px solid var(--red);
    background: rgba(255,84,84,.1);
    color: var(--red);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all .12s;
  }

  .stop-btn:hover { background: var(--red); color: #fff; box-shadow: 0 0 20px rgba(255,84,84,.4); }

  /* ---------- 键盘提示 ---------- */
  .key-hint {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .key-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }

  .key {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 24px;
    height: 24px;
    padding: 0 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    font-family: monospace;
    color: var(--text);
  }

  /* ---------- 右侧仪表盘 ---------- */
  .dashboard {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ---------- 仪表条 ---------- */
  .gauge-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    font-size: 13px;
  }

  .gauge-name { color: var(--muted); font-weight: 500; }
  .gauge-value { font-weight: 700; font-size: 16px; font-variant-numeric: tabular-nums; }

  .gauge-bar-track {
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  .gauge-bar {
    height: 100%;
    border-radius: 4px;
    transition: width .15s, background .15s;
    background: var(--green);
  }

  .gauge-bar.neg { background: var(--accent); }

  /* ---------- 坐标显示 ---------- */
  .coord-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .coord-item {
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .coord-name { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .coord-val  { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }

  /* ---------- 命令可视化 ---------- */
  .cmd-bars { display: flex; flex-direction: column; gap: 10px; }

  .cmd-row {
    display: grid;
    grid-template-columns: 60px 1fr 60px;
    align-items: center;
    gap: 8px;
  }

  .cmd-label { font-size: 12px; color: var(--muted); }
  .cmd-val   { font-size: 12px; font-weight: 700; text-align: right; font-variant-numeric: tabular-nums; }

  .bipolar-track {
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    position: relative;
  }

  .bipolar-bar {
    position: absolute;
    height: 100%;
    border-radius: 4px;
    transition: left .1s, width .1s, background .1s;
    background: var(--accent);
    top: 0;
  }

  /* ---------- 日志 ---------- */
  .log-box {
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px;
    height: 100px;
    overflow-y: auto;
    font-size: 11px;
    font-family: monospace;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .log-box .log-line { color: var(--text); }
  .log-box .log-line.warn { color: var(--accent); }
  .log-box .log-line.err  { color: var(--red); }

  /* ---------- 滚动条 ---------- */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- 顶栏 -->
<header>
  <div class="logo">
    <!-- 叉车图标 SVG -->
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="10" width="18" height="12" rx="2" fill="var(--accent)" opacity=".9"/>
      <rect x="20" y="6" width="3" height="16" rx="1" fill="var(--accent)"/>
      <rect x="20" y="10" width="10" height="2" rx="1" fill="var(--accent)" opacity=".7"/>
      <rect x="20" y="14" width="10" height="2" rx="1" fill="var(--accent)" opacity=".7"/>
      <circle cx="6"  cy="24" r="3" fill="var(--text)" stroke="var(--surface)" stroke-width="1"/>
      <circle cx="16" cy="24" r="3" fill="var(--text)" stroke="var(--surface)" stroke-width="1"/>
    </svg>
    叉车仿真控制台
  </div>
  <div class="status-badge waiting" id="statusBadge">
    <div class="status-dot"></div>
    <span id="statusText">等待仿真就绪…</span>
  </div>
</header>

<!-- 主体 -->
<main>

  <!-- 左：控制面板 -->
  <div class="control-panel">

    <!-- 方向控制 -->
    <div class="card">
      <div class="card-title">行驶控制</div>
      <div class="dpad">
        <button class="dpad-btn dpad-up"    id="btnFwd"   title="前进 (W)">▲</button>
        <button class="dpad-btn dpad-left"  id="btnLeft"  title="左转 (A)">◀</button>
        <button class="dpad-btn dpad-center" style="font-size:13px;color:var(--muted)">STOP</button>
        <button class="dpad-btn dpad-right" id="btnRight" title="右转 (D)">▶</button>
        <button class="dpad-btn dpad-down"  id="btnBack"  title="后退 (S)">▼</button>
      </div>
    </div>

    <!-- 起升控制 -->
    <div class="card">
      <div class="card-title">货叉控制</div>
      <div class="lift-controls">
        <button class="lift-btn up"   id="btnLiftUp"   title="起升 (Q)">
          <span style="font-size:20px">▲</span> 起升
        </button>
        <button class="lift-btn down" id="btnLiftDown" title="下降 (E)">
          <span style="font-size:20px">▼</span> 下降
        </button>
      </div>
    </div>

    <!-- 急停 -->
    <div class="card" style="padding:14px 20px">
      <button class="stop-btn" id="btnStop">⬛ 紧急停止 (Space)</button>
    </div>

    <!-- 键盘提示 -->
    <div class="card">
      <div class="card-title">键盘操作</div>
      <div class="key-hint">
        <div class="key-item"><span class="key">W</span> 前进</div>
        <div class="key-item"><span class="key">S</span> 后退</div>
        <div class="key-item"><span class="key">A</span> 左转</div>
        <div class="key-item"><span class="key">D</span> 右转</div>
        <div class="key-item"><span class="key">Q</span> 起升</div>
        <div class="key-item"><span class="key">E</span> 下降</div>
        <div class="key-item"><span class="key">Space</span> 停止</div>
      </div>
    </div>

  </div>

  <!-- 右：仪表盘 -->
  <div class="dashboard">

    <!-- 当前命令 -->
    <div class="card">
      <div class="card-title">当前命令</div>
      <div class="cmd-bars">
        <div class="cmd-row">
          <span class="cmd-label">前后</span>
          <div class="bipolar-track" id="barDrive"><div class="bipolar-bar" id="fillDrive"></div></div>
          <span class="cmd-val" id="valDrive">0.00</span>
        </div>
        <div class="cmd-row">
          <span class="cmd-label">转向</span>
          <div class="bipolar-track" id="barSteer"><div class="bipolar-bar" id="fillSteer"></div></div>
          <span class="cmd-val" id="valSteer">0.00</span>
        </div>
        <div class="cmd-row">
          <span class="cmd-label">起升</span>
          <div class="bipolar-track" id="barLift"><div class="bipolar-bar" id="fillLift"></div></div>
          <span class="cmd-val" id="valLift">0.00</span>
        </div>
      </div>
    </div>

    <!-- 位置 -->
    <div class="card">
      <div class="card-title">位置</div>
      <div class="coord-grid">
        <div class="coord-item"><div class="coord-name">X (m)</div><div class="coord-val" id="posX">—</div></div>
        <div class="coord-item"><div class="coord-name">Y (m)</div><div class="coord-val" id="posY">—</div></div>
        <div class="coord-item"><div class="coord-name">偏航 (°)</div><div class="coord-val" id="posYaw">—</div></div>
        <div class="coord-item"><div class="coord-name">货叉高 (m)</div><div class="coord-val" id="liftH">—</div></div>
      </div>
    </div>

    <!-- 速度 -->
    <div class="card">
      <div class="card-title">速度</div>
      <div class="gauge-label">
        <span class="gauge-name">Vx (m/s)</span>
        <span class="gauge-value" id="velX">0.00</span>
      </div>
      <div class="gauge-bar-track"><div class="gauge-bar" id="barVx" style="width:0%"></div></div>
      <div style="margin-top:12px" class="gauge-label">
        <span class="gauge-name">Vy (m/s)</span>
        <span class="gauge-value" id="velY">0.00</span>
      </div>
      <div class="gauge-bar-track"><div class="gauge-bar" id="barVy" style="width:0%"></div></div>
    </div>

    <!-- 日志 -->
    <div class="card">
      <div class="card-title">系统日志</div>
      <div class="log-box" id="logBox"></div>
    </div>

  </div>
</main>

<script>
// ============================================================
// 状态
// ============================================================
const cmd = { drive: 0, steer: 0, lift: 0 };
const keys = new Set();
let ws = null;
let simReady = false;
let sendInterval = null;

// ============================================================
// 工具
// ============================================================
function log(msg, level = '') {
  const box = document.getElementById('logBox');
  const line = document.createElement('div');
  line.className = 'log-line ' + level;
  line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
  if (box.children.length > 80) box.removeChild(box.firstChild);
}

function fmt(v, d = 2) { return Number(v).toFixed(d); }

function setBipolar(fillId, value) {
  const fill = document.getElementById(fillId);
  const pct = Math.abs(value) * 50;
  if (value >= 0) {
    fill.style.left = '50%';
    fill.style.width = pct + '%';
    fill.style.background = 'var(--green)';
  } else {
    fill.style.left = (50 - pct) + '%';
    fill.style.width = pct + '%';
    fill.style.background = 'var(--accent)';
  }
}

function setStatus(state) {
  const badge = document.getElementById('statusBadge');
  const txt   = document.getElementById('statusText');
  badge.className = 'status-badge ' + state.cls;
  txt.textContent = state.text;
}

// ============================================================
// 发送命令（REST）
// ============================================================
async function sendCommand() {
  if (!simReady) return;
  try {
    await fetch('/api/command', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(cmd),
    });
  } catch (e) { /* 忽略网络偶发错误 */ }
}

// ============================================================
// 键盘 → 命令
// ============================================================
function updateCmdFromKeys() {
  let drive = 0, steer = 0, lift = 0;
  if (keys.has('w') || keys.has('arrowup'))    drive =  1;
  if (keys.has('s') || keys.has('arrowdown'))  drive = -1;
  if (keys.has('a') || keys.has('arrowleft'))  steer =  1;
  if (keys.has('d') || keys.has('arrowright')) steer = -1;
  if (keys.has('q'))  lift =  1;
  if (keys.has('e'))  lift = -1;
  cmd.drive = drive; cmd.steer = steer; cmd.lift = lift;
  updateCmdUI();
}

function updateCmdUI() {
  document.getElementById('valDrive').textContent = fmt(cmd.drive);
  document.getElementById('valSteer').textContent = fmt(cmd.steer);
  document.getElementById('valLift').textContent  = fmt(cmd.lift);
  setBipolar('fillDrive', cmd.drive);
  setBipolar('fillSteer', cmd.steer);
  setBipolar('fillLift',  cmd.lift);
}

document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k === ' ') { e.preventDefault(); emergencyStop(); return; }
  if (['w','a','s','d','q','e','arrowup','arrowdown','arrowleft','arrowright'].includes(k)) {
    e.preventDefault();
    keys.add(k);
    updateCmdFromKeys();
  }
});

document.addEventListener('keyup', e => {
  keys.delete(e.key.toLowerCase());
  updateCmdFromKeys();
});

// ============================================================
// 按钮控制
// ============================================================
function setupButton(id, driveV, steerV, liftV) {
  const btn = document.getElementById(id);
  const activate = () => {
    cmd.drive = driveV; cmd.steer = steerV; cmd.lift = liftV;
    btn.classList.add('active');
    updateCmdUI();
  };
  const deactivate = () => {
    btn.classList.remove('active');
    // 仅清除该按钮负责的轴
    if (driveV !== 0) cmd.drive = 0;
    if (steerV !== 0) cmd.steer = 0;
    if (liftV  !== 0) cmd.lift  = 0;
    updateCmdUI();
  };

  ['mousedown','touchstart'].forEach(ev => btn.addEventListener(ev, e => { e.preventDefault(); activate(); }));
  ['mouseup','mouseleave','touchend','touchcancel'].forEach(ev => btn.addEventListener(ev, e => { e.preventDefault(); deactivate(); }));
}

setupButton('btnFwd',      1,  0,  0);
setupButton('btnBack',    -1,  0,  0);
setupButton('btnLeft',     0,  1,  0);
setupButton('btnRight',    0, -1,  0);
setupButton('btnLiftUp',   0,  0,  1);
setupButton('btnLiftDown', 0,  0, -1);

function emergencyStop() {
  cmd.drive = 0; cmd.steer = 0; cmd.lift = 0;
  keys.clear();
  updateCmdUI();
  sendCommand();
  log('紧急停止！', 'warn');
}

document.getElementById('btnStop').addEventListener('click', emergencyStop);

// ============================================================
// 定时发送命令（20 Hz）
// ============================================================
function startSendLoop() {
  if (sendInterval) return;
  sendInterval = setInterval(sendCommand, 50);
}

// ============================================================
// WebSocket：接收状态
// ============================================================
function updateStateUI(state) {
  document.getElementById('posX').textContent   = fmt(state.x, 2);
  document.getElementById('posY').textContent   = fmt(state.y, 2);
  document.getElementById('posYaw').textContent = fmt(state.yaw_deg, 1);
  document.getElementById('liftH').textContent  = fmt(state.lift_height_m, 3);

  const vx = state.vx || 0, vy = state.vy || 0;
  document.getElementById('velX').textContent = fmt(vx);
  document.getElementById('velY').textContent = fmt(vy);

  const maxV = 5;
  document.getElementById('barVx').style.width = Math.min(Math.abs(vx)/maxV*100, 100) + '%';
  document.getElementById('barVy').style.width = Math.min(Math.abs(vy)/maxV*100, 100) + '%';
}

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    log('WebSocket 已连接');
    setStatus({ cls: 'connected', text: '仿真运行中' });
    simReady = true;
    startSendLoop();
  };

  ws.onmessage = e => {
    try { updateStateUI(JSON.parse(e.data)); } catch {}
  };

  ws.onclose = () => {
    simReady = false;
    setStatus({ cls: 'disconnected', text: '连接已断开' });
    log('WebSocket 断开，3s 后重连…', 'warn');
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => {
    setStatus({ cls: 'disconnected', text: '连接错误' });
  };
}

// ============================================================
// 等待仿真就绪后建立 WS 连接
// ============================================================
async function waitForSim() {
  while (true) {
    try {
      const r = await fetch('/api/ready');
      const j = await r.json();
      if (j.ready) break;
    } catch {}
    await new Promise(res => setTimeout(res, 1000));
  }
  log('仿真已就绪，建立 WebSocket…');
  connectWS();
}

waitForSim();
</script>
</body>
</html>
